name: Employee ML CI pipeline

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main


jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.10"

            - name: install Dependecies
              run: |
                pip install -r requirements.txt
            - name: Train Model
              run: |
                python src/train.py
            - name: Run Tests
              run: |
                pytest
